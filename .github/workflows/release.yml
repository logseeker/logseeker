name: Auto Release

# バージョンタグ(v*)をpushした時だけGitHub Releaseを自動作成する
# （push毎だと1リリースの中身が薄くなりすぎるため、タグpushという明示的な操作を
#  トリガーにして、ある程度まとまった単位でリリースを切れるようにする）。
#
# 本文(release notes)は前回タグ以降のコミットのsubject行を並べて作る
# （このリポジトリはPRを使わず直接mainへpushする運用のため、PRタイトルを前提にした
#  GitHubの generate_release_notes だと拾うものが無く内容が空になってしまう）。
#
# リリースを切りたいとき:
#   git tag v1.2.0
#   git push <remote> v1.2.0

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build release notes from commit subjects since previous tag
        id: notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            RANGE="$PREV_TAG..${GITHUB_REF_NAME}"
          else
            RANGE="${GITHUB_REF_NAME}"
          fi
          {
            echo "notes<<RELEASE_NOTES_EOF"
            git log "$RANGE" --no-merges --pretty=format:"- %s"
            echo ""
            echo "RELEASE_NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.notes }}
          token: ${{ secrets.GITHUB_TOKEN }}
